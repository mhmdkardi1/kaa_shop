<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="navbar">
            <a href="index.html" class="logo">Shop<span>Ease</span></a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Produk</a></li>
                    <li><a href="profile.html">Akun Saya</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="login.html" title="Login"><i class="fas fa-user"></i></a>
                <a href="cart.html" class="cart-icon" title="Keranjang">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main style="max-width: 1200px; margin: 50px auto; padding: 0 20px;">
        <div style="display: flex; flex-wrap: wrap; gap: 50px; align-items: flex-start;">
            
            <div style="flex: 1; min-width: 300px;">
                <img id="detail-img" src="assets/product-1.jpg" alt="Foto Produk" style="width: 100%; max-height: 500px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            </div>

            <div style="flex: 1; min-width: 300px;">
                <h1 id="detail-title" style="font-size: 32px; color: #2f3542; margin-bottom: 10px;">Nama Produk</h1>
                <p id="detail-price" style="font-size: 24px; color: #ff4757; font-weight: 700; margin-bottom: 20px;">Rp 0</p>
                
                <hr style="border: 0; border-top: 1px solid #ddd; margin-bottom: 20px;">
                
                <h3 style="margin-bottom: 10px; color: #2f3542;">Deskripsi Produk</h3>
                <p id="detail-desc" style="color: #57606f; line-height: 1.8; margin-bottom: 30px;">
                    Detail deskripsi produk akan muncul di sini secara dinamis berdasarkan data yang dikirim oleh server backend Java.
                </p>

                <div style="display: flex; gap: 15px; align-items: center;">
                    <div style="display: flex; align-items: center; border: 1px solid #ddd; border-radius: 6px; overflow: hidden;">
                        <button id="btn-minus" style="padding: 10px 15px; background: #f1f2f6; border: none; cursor: pointer; font-weight: bold;">-</button>
                        <input id="input-qty" type="number" value="1" min="1" style="width: 50px; text-align: center; border: none; outline: none; font-weight: bold;">
                        <button id="btn-plus" style="padding: 10px 15px; background: #f1f2f6; border: none; cursor: pointer; font-weight: bold;">+</button>
                    </div>
                    
                    <button id="btn-add-to-cart" class="btn" style="flex: 1; display: flex; justify-content: center; align-items: center; gap: 10px;">
                        <i class="fas fa-shopping-cart"></i> Masukkan Ke Keranjang
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 ShopEase. Built professionally for portfolio deployment.</p>
        </div>
    </footer>

    <script src="js/products-data.js"></script>
<script src="js/main.js"></script>
<script src="js/detail.js"></script>
</body>
</html>
